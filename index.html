<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HQ Media Downloader</title>
<style>
  :root {
    --bg: #0b0f17;
    --panel: #131a26;
    --panel-2: #1b2534;
    --line: #263243;
    --text: #e8edf4;
    --muted: #93a1b5;
    --accent: #5b8cff;
    --accent-2: #7c5cff;
    --ok: #2fd07a;
    --err: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1100px 600px at 50% -10%, #1a2436 0%, var(--bg) 55%);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 40px 16px 64px;
  }
  .wrap { width: 100%; max-width: 620px; }
  header { text-align: center; margin-bottom: 22px; }
  h1 { font-size: 26px; margin: 0 0 6px; letter-spacing: -0.02em; }
  .sub { color: var(--muted); font-size: 14px; }
  .badges { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
  .badge {
    font-size: 12px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 4px 10px; background: var(--panel);
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  }
  .row { display: flex; gap: 10px; }
  input[type="text"] {
    flex: 1; min-width: 0;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 10px;
    padding: 13px 14px;
    font-size: 15px;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  button {
    border: none; cursor: pointer; font-weight: 600;
    border-radius: 10px; font-size: 15px;
    padding: 13px 18px; color: white;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    transition: transform .05s ease, opacity .2s ease;
  }
  button:hover { opacity: .93; }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .ghost {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line);
  }
  .preview {
    display: none; gap: 14px; margin-top: 18px;
    padding: 14px; border: 1px solid var(--line);
    border-radius: 12px; background: var(--panel-2);
  }
  .preview img {
    width: 132px; height: 78px; object-fit: cover;
    border-radius: 8px; background: #000; flex-shrink: 0;
  }
  .pv-meta { min-width: 0; }
  .pv-title {
    font-weight: 600; font-size: 15px; line-height: 1.3;
    margin-bottom: 4px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .pv-sub { color: var(--muted); font-size: 13px; }
  .controls { display: none; margin-top: 18px; }
  .seg { display: flex; background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 4px; }
  .seg button {
    flex: 1; background: transparent; color: var(--muted);
    padding: 9px; font-size: 14px; border-radius: 7px;
  }
  .seg button.active { background: var(--accent); color: #fff; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 16px 0 7px; }
  select {
    width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; font-size: 15px; outline: none;
  }
  select:focus { border-color: var(--accent); }
  .go { width: 100%; margin-top: 18px; padding: 15px; font-size: 16px; }
  .status { display: none; margin-top: 18px; }
  .bar { height: 10px; background: var(--panel-2); border-radius: 999px; overflow: hidden; border: 1px solid var(--line); }
  .fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .3s ease; }
  .status-text { font-size: 13px; color: var(--muted); margin-top: 9px; text-align: center; }
  .msg { display: none; margin-top: 16px; padding: 12px 14px; border-radius: 10px; font-size: 14px; }
  .msg.err { display: block; background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.35); color: #ffb3b3; }
  .msg.ok { display: block; background: rgba(47,208,122,.1); border: 1px solid rgba(47,208,122,.35); color: #9df0c2; }
  .msg a { color: var(--ok); font-weight: 600; }
  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 22px; line-height: 1.6; }
  .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: sp .7s linear infinite; vertical-align: -2px; margin-right: 6px; }
  @keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>HQ Media Downloader</h1>
      <div class="sub">Paste a link — get it back at the highest quality, audio + video.</div>
      <div class="badges">
        <span class="badge">YouTube</span>
        <span class="badge">TikTok</span>
        <span class="badge">Instagram</span>
        <span class="badge">up to 4K</span>
      </div>
    </header>

    <div class="card">
      <div class="row">
        <input id="url" type="text" placeholder="Paste a video link…" autocomplete="off" spellcheck="false" />
        <button id="fetchBtn" onclick="fetchInfo()">Fetch</button>
      </div>

      <div class="preview" id="preview">
        <img id="thumb" alt="" />
        <div class="pv-meta">
          <div class="pv-title" id="pvTitle"></div>
          <div class="pv-sub" id="pvSub"></div>
        </div>
      </div>

      <div class="controls" id="controls">
        <div class="seg" id="modeSeg">
          <button class="active" data-mode="video" onclick="setMode('video')">🎬 Video</button>
          <button data-mode="audio" onclick="setMode('audio')">🎵 Audio</button>
        </div>

        <label id="qLabel">Quality</label>
        <select id="quality"></select>

        <button class="go" id="goBtn" onclick="startDownload()">Download</button>
      </div>

      <div class="status" id="status">
        <div class="bar"><div class="fill" id="fill"></div></div>
        <div class="status-text" id="statusText">Starting…</div>
      </div>

      <div class="msg" id="msg"></div>
    </div>

    <footer>
      For downloading your own content, or content you have the rights to.<br />
      Highest quality works by merging the best video &amp; audio streams with ffmpeg.
    </footer>
  </div>

<script>
  let mode = "video";
  let availableHeights = [];

  const $ = (id) => document.getElementById(id);

  function fmtDuration(s) {
    if (!s) return "";
    s = Math.round(s);
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    return (h ? h + ":" + String(m).padStart(2, "0") : m) + ":" + String(sec).padStart(2, "0");
  }

  async function fetchInfo() {
    const url = $("url").value.trim();
    if (!url) return;
    hideMsg();
    $("preview").style.display = "none";
    $("controls").style.display = "none";
    const btn = $("fetchBtn");
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';
    try {
      const r = await fetch("/api/info", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || "Could not read that link.");

      $("thumb").src = data.thumbnail || "";
      $("pvTitle").textContent = data.title || "Untitled";
      const bits = [];
      if (data.extractor) bits.push(data.extractor);
      if (data.uploader) bits.push(data.uploader);
      if (data.duration) bits.push(fmtDuration(data.duration));
      $("pvSub").textContent = bits.join("  •  ");
      $("preview").style.display = "flex";

      availableHeights = data.heights || [];
      setMode(mode);
      $("controls").style.display = "block";
    } catch (e) {
      showErr(e.message);
    } finally {
      btn.disabled = false; btn.textContent = "Fetch";
    }
  }

  function setMode(m) {
    mode = m;
    document.querySelectorAll("#modeSeg button").forEach((b) =>
      b.classList.toggle("active", b.dataset.mode === m)
    );
    const q = $("quality");
    q.innerHTML = "";
    if (m === "video") {
      $("qLabel").textContent = "Resolution";
      const opts = [["best", "Best available"]];
      const tiers = [[2160, "4K (2160p)"], [1440, "1440p"], [1080, "1080p"], [720, "720p"], [480, "480p"]];
      for (const [h, label] of tiers) {
        if (!availableHeights.length || availableHeights.some((x) => x >= h)) {
          opts.push([String(h), label]);
        }
      }
      for (const [v, l] of opts) q.add(new Option(l, v));
    } else {
      $("qLabel").textContent = "Audio format";
      q.add(new Option("Original quality (best, no re-encode)", "original"));
      q.add(new Option("MP3 320kbps (universal)", "mp3"));
    }
  }

  async function startDownload() {
    const url = $("url").value.trim();
    if (!url) return;
    hideMsg();
    $("goBtn").disabled = true;
    $("status").style.display = "block";
    setProgress(0, "Starting…");

    try {
      const r = await fetch("/api/download", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, mode, quality: $("quality").value }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || "Could not start download.");
      poll(data.job_id);
    } catch (e) {
      showErr(e.message);
      $("goBtn").disabled = false;
      $("status").style.display = "none";
    }
  }

  async function poll(jobId) {
    try {
      const r = await fetch("/api/status/" + jobId);
      const s = await r.json();

      if (s.status === "error") {
        showErr(s.error || "Download failed.");
        $("goBtn").disabled = false;
        $("status").style.display = "none";
        return;
      }

      const stageLabel = s.stage === "processing"
        ? "Merging video + audio…"
        : (s.stage === "downloading" ? "Downloading…" : "Working…");
      setProgress(s.progress || 0, stageLabel + " " + Math.round(s.progress || 0) + "%");

      if (s.status === "done") {
        setProgress(100, "Done!");
        const link = "/api/file/" + jobId;
        // Trigger the browser download
        const a = document.createElement("a");
        a.href = link; a.download = s.filename || "";
        document.body.appendChild(a); a.click(); a.remove();
        showOk('Saved <b>' + (s.filename || "your file") + '</b>. If it didn\'t start, <a href="' + link + '">click here</a>.');
        $("goBtn").disabled = false;
        setTimeout(() => ($("status").style.display = "none"), 1200);
        return;
      }
      setTimeout(() => poll(jobId), 900);
    } catch (e) {
      setTimeout(() => poll(jobId), 1500);
    }
  }

  function setProgress(pct, text) {
    $("fill").style.width = Math.max(2, pct) + "%";
    $("statusText").textContent = text;
  }
  function showErr(m) { const el = $("msg"); el.className = "msg err"; el.innerHTML = m; }
  function showOk(m) { const el = $("msg"); el.className = "msg ok"; el.innerHTML = m; }
  function hideMsg() { $("msg").className = "msg"; }

  $("url").addEventListener("keydown", (e) => { if (e.key === "Enter") fetchInfo(); });
</script>
</body>
</html>
